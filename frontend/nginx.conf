server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/health {
        access_log off;
        return 200 '{"status":"ok","service":"riedu-eshop-frontend"}';
        add_header Content-Type application/json;
    }
}
