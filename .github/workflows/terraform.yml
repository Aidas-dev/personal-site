name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform.yml"

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.3
          terraform_wrapper: true

      - name: Init Terraform
        working-directory: infrastructure/cloudflare-workers
        run: terraform init

      - name: Validate Terraform
        working-directory: infrastructure/cloudflare-workers
        run: terraform validate

      - name: Check Formatting
        working-directory: infrastructure/cloudflare-workers
        run: |
          if ! terraform fmt -check -recursive; then
            echo "::error::Terraform files are not formatted. Run 'terraform fmt -recursive' locally."
            exit 1
          fi

      - name: Plan Terraform
        working-directory: infrastructure/cloudflare-workers
        run: terraform plan -no-color -var "cloudflare_account_id=${{ vars.CF_ACCOUNT_ID }}" -var "cloudflare_zone_id=${{ vars.CF_ZONE_ID }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
