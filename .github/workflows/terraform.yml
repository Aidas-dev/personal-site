name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "cloudflare/**"
      - "infrastructure/cloudflare-workers/**"
      - ".github/workflows/terraform.yml"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'cloudflare/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: cloudflare
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: cloudflare/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: cloudflare/frontend
        run: pnpm run build

      - name: Deploy Worker via Wrangler
        working-directory: cloudflare
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}

      - name: Delete existing worker (cleanup for TF)
        working-directory: cloudflare
        run: |
          if wrangler deployments list 2>/dev/null | grep -q "portfolio"; then
            wrangler deployments delete --name portfolio --force 2>/dev/null || true
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.3

      - name: Init Terraform
        working-directory: infrastructure/cloudflare-workers
        run: terraform init

      - name: Validate Terraform
        working-directory: infrastructure/cloudflare-workers
        run: terraform validate

      - name: Import existing route
        working-directory: infrastructure/cloudflare-workers
        run: |
          TF_VAR_cloudflare_api_token=${{ secrets.CF_API_TOKEN }} terraform import cloudflare_workers_route.portfolio_route "0dd20ed9493a771ee66c376761ecaefa:portfolio.kubexa.tech/*" 2>/dev/null || true

      - name: Check Formatting
        working-directory: infrastructure/cloudflare-workers
        run: |
          if ! terraform fmt -check -recursive; then
            echo "::error::Terraform files are not formatted."
            exit 1
          fi

      - name: Plan Terraform
        working-directory: infrastructure/cloudflare-workers
        run: TF_VAR_cloudflare_api_token=${{ secrets.CF_API_TOKEN }} terraform plan -no-color

      - name: Apply Terraform
        working-directory: infrastructure/cloudflare-workers
        run: |
          TF_VAR_cloudflare_api_token=${{ secrets.CF_API_TOKEN }} terraform apply -auto-approve || {
            echo "Route conflict - deleting existing route"
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/${{ vars.CF_ZONE_ID }}/workers/routes" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"pattern":"portfolio.kubexa.tech/*"}' 2>/dev/null || true
            sleep 2
            TF_VAR_cloudflare_api_token=${{ secrets.CF_API_TOKEN }} terraform apply -auto-approve
          }
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
