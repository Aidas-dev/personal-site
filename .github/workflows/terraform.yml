name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "cloudflare/**"
      - "infrastructure/cloudflare-workers/**"
      - ".github/workflows/terraform.yml"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'cloudflare/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: cloudflare
        run: pnpm install --frozen-lockfile

      - name: Deploy Worker via Wrangler
        working-directory: cloudflare
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.3

      - name: Init Terraform
        working-directory: infrastructure/cloudflare-workers
        run: terraform init

      - name: Validate Terraform
        working-directory: infrastructure/cloudflare-workers
        run: terraform validate

      - name: Check Formatting
        working-directory: infrastructure/cloudflare-workers
        run: |
          if ! terraform fmt -check -recursive; then
            echo "::error::Terraform files are not formatted."
            exit 1
          fi

      - name: Plan Terraform
        working-directory: infrastructure/cloudflare-workers
        run: terraform plan -no-color -var "cloudflare_account_id=${{ vars.CF_ACCOUNT_ID }}" -var "cloudflare_zone_id=${{ vars.CF_ZONE_ID }}" -var "cloudflare_api_token=${{ secrets.CF_API_TOKEN }}"

      - name: Apply Terraform
        working-directory: infrastructure/cloudflare-workers
        run: terraform apply -auto-approve -var "cloudflare_account_id=${{ vars.CF_ACCOUNT_ID }}" -var "cloudflare_zone_id=${{ vars.CF_ZONE_ID }}" -var "cloudflare_api_token=${{ secrets.CF_API_TOKEN }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
