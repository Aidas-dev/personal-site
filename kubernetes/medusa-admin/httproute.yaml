# HTTPRoute for Medusa Admin - Tailscale access only
# NOTE: Access restriction is enforced via CiliumNetworkPolicy (see cilium-policy.yaml)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: medusa-admin
  namespace: riedu-eshop
  annotations:
    # Mark this route as internal-only for documentation
    internal-access: "tailscale-only"
    tailscale-exposed: "true"
spec:
  parentRefs:
    - name: cilium-gateway-oracle
      namespace: cilium-gateway
  hostnames:
    - "admin.riedu.kubexa.tech"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: medusa-admin
          port: 7001
