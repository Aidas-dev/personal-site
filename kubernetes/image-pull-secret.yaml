# =============================================================================
# GHCR Image Pull Secret
# =============================================================================
# ArgoCD manages this secret via the image-pull-secret.yaml Application.
#
# IMPORTANT: The .dockerconfigjson data below is intentionally empty.
# You must populate it before the first deploy.
#
# ── One-time setup ──────────────────────────────────────────────────────────
# 1. Create a GitHub Personal Access Token (classic) with `read:packages` scope:
#    https://github.com/settings/tokens/new
#
# 2. Create the secret manually (imperative, not via Git):
#
#    kubectl create secret docker-registry ghcr-image-pull-secret \
#      --namespace=personal-site \
#      --docker-server=ghcr.io \
#      --docker-username=aidas-dev \
#      --docker-password=<YOUR_PAT> \
#      --dry-run=client -o yaml > kubernetes/image-pull-secret.yaml
#
# 3. Review the generated file, then commit it — or better, use an external
#    secrets manager (Sealed Secrets, External Secrets Operator, SOPS) so
#    credentials never land in Git plaintext.
#
# 4. If you keep this file in Git, encrypt it with SOPS or Mozilla SOPS + age:
#    https://github.com/getsops/sops
#
# ── Verify the secret works ─────────────────────────────────────────────────
#    kubectl get secret ghcr-image-pull-secret -n personal-site -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d | jq
#
# ── Rotate the token ────────────────────────────────────────────────────────
#    kubectl create secret docker-registry ghcr-image-pull-secret \
#      --namespace=personal-site \
#      --docker-server=ghcr.io \
#      --docker-username=aidas-dev \
#      --docker-password=<NEW_PAT> \
#      --dry-run=client -o yaml | kubectl apply -f -
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-image-pull-secret
  namespace: personal-site
  labels:
    app.kubernetes.io/part-of: personal-site
    app.kubernetes.io/component: infrastructure
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "" # ← Replace with base64-encoded Docker config (see instructions above)
