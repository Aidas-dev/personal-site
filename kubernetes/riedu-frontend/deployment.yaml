apiVersion: apps/v1
kind: Deployment
metadata:
  name: riedu-frontend
  namespace: riedu-eshop
  labels:
    app: riedu-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: riedu-frontend
  template:
    metadata:
      labels:
        app: riedu-frontend
        component: frontend
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: location
                    operator: In
                    values:
                      - oracle-cloud
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: riedu-frontend
          image: ghcr.io/aidas-dev/riedu-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: BACKEND_URL
              value: "http://medusa-backend:9000"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
