# =============================================================================
# Frontend HTTPRoute — Cilium Gateway API
# =============================================================================
# Catch-all rule: all non-/api traffic goes to the frontend service.
#
# TODO: Replace "aidaskrisciunas.dev" with your actual domain name.
# Must match the backend HTTPRoute hostname and the Cert-Manager certificate.
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: personal-site
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: personal-site
spec:
  parentRefs:
    - name: cilium-gateway-oracle
      namespace: cilium-gateway
  hostnames:
    - "portfolio.kubexa.tech"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 3000
