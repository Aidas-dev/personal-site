# CiliumNetworkPolicy to restrict admin access to Tailscale IPs only
# Tailscale uses the CGNAT range 100.64.0.0/10
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: medusa-admin-tailscale-restrict
  namespace: riedu-eshop
spec:
  description: "Restrict admin panel access to Tailscale IPs only"
  endpointSelector:
    matchLabels:
      app: medusa-admin
  ingress:
    # Allow from within the cluster (for health checks, etc.)
    - fromEntities:
        - cluster
    # Allow from Tailscale IP range only
    - fromCIDR:
        - "100.64.0.0/10"
      toPorts:
        - ports:
            - port: "7001"
              protocol: TCP

---
# CiliumNetworkPolicy for backend - restrict admin API paths to Tailscale
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: medusa-backend-admin-restrict
  namespace: riedu-eshop
spec:
  description: "Restrict admin API endpoints to Tailscale IPs only"
  endpointSelector:
    matchLabels:
      app: medusa-backend
  ingress:
    # Allow all cluster traffic (for internal services)
    - fromEntities:
        - cluster
    # Allow from Tailscale IP range
    - fromCIDR:
        - "100.64.0.0/10"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
