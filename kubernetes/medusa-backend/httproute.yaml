# HTTPRoute for Medusa Backend - Public storefront API
# Admin API endpoints are restricted via CiliumNetworkPolicy (Tailscale only)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: medusa-backend
  namespace: riedu-eshop
  labels:
    app: medusa-backend
    component: backend
spec:
  parentRefs:
    - name: cilium-gateway-oracle
      namespace: cilium-gateway
  hostnames:
    - "riedu.kubexa.tech"
  rules:
    # Storefront API - strip /api prefix for Medusa
    - matches:
        - path:
            type: PathPrefix
            value: /api/store
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /store
      backendRefs:
        - name: medusa-backend
          port: 9000
    # Product catalog - strip /api prefix
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /products
      backendRefs:
        - name: medusa-backend
          port: 9000
    # Health check - no rewrite
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: medusa-backend
          port: 9000
    # Admin API - Tailscale only (enforced by CiliumNetworkPolicy)
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      backendRefs:
        - name: medusa-backend
          port: 9000
    # Auth endpoints - strip /api prefix
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /auth
      backendRefs:
        - name: medusa-backend
          port: 9000
