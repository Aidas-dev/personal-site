apiVersion: v1
kind: Secret
metadata:
  name: medusa-secrets
  namespace: riedu-eshop
  annotations:
    description: "⚠️ WARNING: These are PLACEHOLDER values. Replace with secure secrets before production use."
type: Opaque
stringData:
  # ⚠️ CHANGE-ME-POSTGRES-PASSWORD - Replace with actual password matching postgres/secret.yaml
  database-url: "postgresql://medusa:CHANGE-ME-POSTGRES-PASSWORD@medusa-postgres-rw.riedu-eshop.svc.cluster.local:5432/medusa"
  # ⚠️ CHANGE-ME-JWT-SECRET - Generate a strong random string (min 32 chars)
  jwt-secret: "CHANGE-ME-JWT-SECRET"
  # ⚠️ CHANGE-ME-COOKIE-SECRET - Generate a strong random string (min 32 chars)
  cookie-secret: "CHANGE-ME-COOKIE-SECRET"
