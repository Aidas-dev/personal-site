# Dragonfly Helm Chart Values
# Uses Oracle local system disk via local-path provisioner

replicaCount: 1

image:
  repository: docker.dragonflydb.io/dragonflydb/dragonfly
  tag: "v1.36.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 6379

persistence:
  enabled: true
  storageClass: oracle-local
  size: 10Gi

resources: {}

nodeSelector:
  location: oracle-cloud

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

affinity: {}

args:
  - "--logtostderr"
  - "--proactor_threads=4"
  - "--save"

env: []
