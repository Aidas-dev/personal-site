# PostgreSQL Database (CloudNativePG)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medusa-postgres
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: riedu-eshop
    app.kubernetes.io/component: database
spec:
  project: default
  source:
    repoURL: https://github.com/Aidas-dev/riedu-eshop.git
    targetRevision: main
    path: kubernetes/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: riedu-eshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
  ignoreDifferences:
    - kind: Secret
      name: medusa-postgres-app
      jsonPointers:
        - /data
