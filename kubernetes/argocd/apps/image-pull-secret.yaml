# Personal Site Image Pull Secret
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: personal-site-image-pull-secret
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: personal-site
    app.kubernetes.io/component: infrastructure
spec:
  project: default
  source:
    repoURL: https://github.com/Aidas-dev/personal-site.git
    targetRevision: main
    path: kubernetes
    directory:
      include: image-pull-secret.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: personal-site
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
