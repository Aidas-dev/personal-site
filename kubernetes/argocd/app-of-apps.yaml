# Personal Site — App of Apps
# Deploys all child Applications from kubernetes/argocd/apps/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: personal-site-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: personal-site
    app.kubernetes.io/component: app-of-apps
spec:
  project: default
  source:
    repoURL: https://github.com/Aidas-dev/personal-site.git
    targetRevision: main
    path: kubernetes/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
