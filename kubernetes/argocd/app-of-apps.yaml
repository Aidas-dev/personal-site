# Argo CD App of Apps - Riedu E-Shop
# This parent application manages all child applications for the Riedu E-Shop platform.
# Each child application is deployed independently by Argo CD.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: riedu-eshop-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: riedu-eshop
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Aidas-dev/riedu-eshop.git
    targetRevision: main
    path: kubernetes/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: riedu-eshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
