apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: personal-site
spec:
  parentRefs:
    - name: cilium-gateway-oracle
      namespace: cilium-gateway
  hostnames:
    - "aidaskrisciunas.dev" # TODO: Replace with actual domain
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: 8000
