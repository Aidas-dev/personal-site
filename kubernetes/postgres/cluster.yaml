apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: medusa-postgres
  namespace: riedu-eshop
spec:
  instances: 1
  imageName: ghcr.io/inherent-design/cloudnative-pg-timescaledb:latest

  bootstrap:
    initdb:
      database: medusa
      owner: medusa
      secret:
        name: medusa-postgres-secret

  storage:
    size: 10Gi
    storageClassName: oracle-local

  resources: {}

  # Schedule on Oracle node - uses local system disk via local-path provisioner
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: location
                operator: In
                values:
                  - oracle-cloud

  postgresql:
    parameters:
      shared_preload_libraries: "timescaledb"
      max_connections: "200"
      shared_buffers: "256MB"

  monitoring:
    enablePodMonitor: true
